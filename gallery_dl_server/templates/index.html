<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Web frontend for gallery-dl with yt-dlp" />

    <title>gallery-dl-server</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      integrity="sha384-XGjxtQfXaH2tnPFa9x+ruJTuLE3Aa6LhHSWRr1XeTyhezb4abCG4ccI5AkVDxqC+"
      crossorigin="anonymous"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/sweetalert2@11.12.1/dist/sweetalert2.min.css"
      integrity="sha384-0rAIx50lGVKKgD0hHiZxK1Qr9rwyluE7lb/4He9HuRAzfaemTbDsikKlQmxu0T8e"
      crossorigin="anonymous"
    />

    <link rel="stylesheet" href="/static/styles/common.css?v=0.2.0" />
    <link rel="stylesheet" href="/static/styles/index.css?v=0.2.0" />

    <link rel="icon" href="/static/icons/favicon.ico" type="image/x-icon" />
    <link rel="icon" href="/static/icons/favicon-16x16.png" sizes="16x16" type="image/png" />
    <link rel="icon" href="/static/icons/favicon-32x32.png" sizes="32x32" type="image/png" />
    <link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png" sizes="180x180" />
    <link rel="manifest" href="/static/icons/site.webmanifest" />

    <script
      src="https://cdn.jsdelivr.net/npm/sweetalert2@11.12.1/dist/sweetalert2.min.js"
      integrity="sha384-+KH6r+BQCUofyrPWto++vkathMCGgcUomPfaNOyHmsw/PUw5LXIrZV8/XuRnVHc/"
      crossorigin="anonymous"
    ></script>
  </head>

  <body class="app-shell d-none">
    <header class="app-header">
      <a class="brand-link" href="/gallery-dl" aria-label="gallery-dl home">
        <i class="bi bi-cloud-arrow-down-fill" aria-hidden="true"></i>
        <span>gallery-dl</span>
      </a>

      <nav class="header-actions" aria-label="Primary">
        <a class="nav-action" href="/gallery-dl/logs">
          <i class="bi bi-file-earmark-text" aria-hidden="true"></i>
          <span>Logs</span>
        </a>
        <a
          class="nav-action"
          href="https://github.com/qx6ghqkz/gallery-dl-server"
          target="_blank"
          rel="noopener noreferrer"
        >
          <i class="bi bi-github" aria-hidden="true"></i>
          <span>GitHub</span>
        </a>
        <span class="version-pill">v{{ app_version }}</span>
        <button
          id="dark-mode-toggle"
          class="icon-button"
          type="button"
          title="Toggle theme"
          aria-label="Toggle theme"
        >
          <i class="bi bi-moon-fill" aria-hidden="true"></i>
        </button>
      </nav>
    </header>

    <main class="app-layout">
      <section class="panel download-panel" aria-labelledby="download-title">
        <div class="panel-header">
          <div>
            <p class="eyebrow">Queue</p>
            <h1 id="download-title">New Download</h1>
          </div>
          <span id="socket-status" class="status-pill">Connecting</span>
        </div>

        <form id="form" class="download-form">
          <div class="field-block">
            <label class="form-label" for="url-input">URL</label>
            <input
              id="url-input"
              name="url"
              type="url"
              class="form-control"
              placeholder="https://"
              autocomplete="url"
              required
              autofocus
            />
          </div>

          <div class="form-row">
            <div class="field-block">
              <label class="form-label" for="video-opts">Mode</label>
              <select id="video-opts" class="form-select" name="video-opts" title="Download mode">
                <option value="none-selected" selected>Default</option>
                <option value="download-video">Video</option>
                <option value="extract-audio">Audio</option>
              </select>
            </div>

            <button id="button-submit" class="btn btn-primary-action" type="submit">
              <i class="bi bi-plus-circle" aria-hidden="true"></i>
              <span>Queue</span>
            </button>
          </div>
        </form>

        <dl class="runtime-list">
          <div>
            <dt>gallery-dl</dt>
            <dd>v{{ gallery_dl_version }}</dd>
          </div>
          <div>
            <dt>yt-dlp</dt>
            <dd>v{{ yt_dlp_version }}</dd>
          </div>
        </dl>
      </section>

      <section class="panel player-panel" aria-labelledby="player-title">
        <div class="panel-header">
          <div>
            <p class="eyebrow">Viewer</p>
            <h2 id="player-title">Media Player</h2>
          </div>
          <a
            id="media-download"
            class="icon-button"
            href="#"
            download
            hidden
            title="Download media"
            aria-label="Download media"
          >
            <i class="bi bi-download" aria-hidden="true"></i>
          </a>
        </div>

        <div class="player-stage">
          <div id="player-empty" class="empty-state">
            <i class="bi bi-play-btn" aria-hidden="true"></i>
            <span>Select a file</span>
          </div>
          <img id="media-image" alt="" hidden />
          <video id="media-video" controls playsinline preload="metadata" hidden></video>
          <audio id="media-audio" controls preload="metadata" hidden></audio>
        </div>

        <div id="media-details" class="media-details" hidden>
          <strong id="media-title"></strong>
          <span id="media-subtitle"></span>
        </div>
      </section>

      <section class="panel library-panel" aria-labelledby="library-title">
        <div class="panel-header">
          <div>
            <p class="eyebrow">Downloads</p>
            <h2 id="library-title">Library</h2>
          </div>
          <button
            id="refresh-media"
            class="icon-button"
            type="button"
            title="Refresh library"
            aria-label="Refresh library"
          >
            <i class="bi bi-arrow-clockwise" aria-hidden="true"></i>
          </button>
        </div>

        <div class="library-meta">
          <span id="media-count">Loading</span>
          <span id="media-root"></span>
        </div>

        <div id="media-empty" class="empty-state compact" hidden>
          <i class="bi bi-folder2-open" aria-hidden="true"></i>
          <span>No media found</span>
        </div>
        <div id="media-list" class="media-list" role="list"></div>
      </section>

      <section class="panel logs-panel" aria-labelledby="activity-title">
        <div class="panel-header">
          <div>
            <p class="eyebrow">Activity</p>
            <h2 id="activity-title">Live Logs</h2>
          </div>
          <div class="panel-actions">
            <button id="button-logs" class="btn btn-secondary-action" type="button">
              <i class="bi bi-terminal" aria-hidden="true"></i>
              <span>Show</span>
            </button>
            <a class="icon-button" href="/gallery-dl/logs" title="Open logs" aria-label="Open logs">
              <i class="bi bi-box-arrow-up-right" aria-hidden="true"></i>
            </a>
          </div>
        </div>

        <textarea id="box" class="log-output" name="Logs" readonly hidden></textarea>
      </section>
    </main>

    <footer class="app-footer">
      Web frontend for
      <a href="https://github.com/mikf/gallery-dl" target="_blank" rel="noopener noreferrer"
        >gallery-dl</a
      >
      with
      <a href="https://github.com/yt-dlp/yt-dlp" target="_blank" rel="noopener noreferrer"
        >yt-dlp</a
      >
    </footer>

    <script src="/static/scripts/index.js?v=0.2.0"></script>
  </body>
</html>
